<script>
// ==========================================
// CONFIGURAÇÃO DO FIREBASE (NUVEM)
// ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyAc6FFJ7Nq8f9ZrT2TofAYwRRFX-_-TyUY",
  authDomain: "atelie03.firebaseapp.com",
  projectId: "atelie03",
  storageBucket: "atelie03.firebasestorage.app",
  messagingSenderId: "23079597569",
  appId: "1:23079597569:web:d35935ad05cd70c8cf3200",
  measurementId: "G-9FMVXGHBVJ"
};

// Inicializa o Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==========================================
// VARIÁVEIS DE DADOS
// ==========================================
let estoque = [];
let saidas = [];
let clientes = []; 

// ==========================================
// TELA DE BLOQUEIO
// ==========================================
const SENHA_CORRETA = "123456";
let senhaAtual = "";

function initLockScreen() {
  const lockScreen = document.getElementById('lock-screen');
  const lastLoginDate = localStorage.getItem('atelie_last_login_date');
  const today = new Date().toDateString(); 

  if (lastLoginDate === today) {
    lockScreen.style.display = 'none';
    loadData(); 
  } else {
    lockScreen.style.display = 'flex';
    lockScreen.classList.remove('unlocked');
  }
}

function updateDots() {
  const dots = document.querySelectorAll('#pin-dots .dot');
  dots.forEach((dot, index) => {
    if (index < senhaAtual.length) {
      dot.classList.add('filled');
    } else {
      dot.classList.remove('filled');
    }
  });
}

const hiddenPin = document.getElementById('hidden-pin');
hiddenPin.addEventListener('input', function(e) {
  senhaAtual = e.target.value.replace(/\D/g, '').substring(0, 6);
  e.target.value = senhaAtual; 
  updateDots();
  if (senhaAtual.length === 6) { setTimeout(checkPin, 150); }
});

function addPin(numStr) {
  if (senhaAtual.length < 6) {
    senhaAtual += numStr;
    hiddenPin.value = senhaAtual; 
    updateDots();
    if (senhaAtual.length === 6) { setTimeout(checkPin, 150); }
  }
}

function removePin() {
  senhaAtual = senhaAtual.slice(0, -1);
  hiddenPin.value = senhaAtual;
  updateDots();
}

function checkPin() {
  const lockScreen = document.getElementById('lock-screen');
  const dotsContainer = document.getElementById('pin-dots');

  if (senhaAtual === SENHA_CORRETA) {
    localStorage.setItem('atelie_last_login_date', new Date().toDateString());
    lockScreen.classList.add('unlocked');
    hiddenPin.blur(); 
    setTimeout(() => { 
      lockScreen.style.display = 'none'; 
      loadData(); 
    }, 500);
  } else {
    dotsContainer.classList.add('error-shake');
    setTimeout(() => {
      dotsContainer.classList.remove('error-shake');
      senhaAtual = "";
      hiddenPin.value = "";
      updateDots();
    }, 400);
  }
}

function forceLock() {
  localStorage.removeItem('atelie_last_login_date');
  senhaAtual = "";
  hiddenPin.value = "";
  updateDots();
  const lockScreen = document.getElementById('lock-screen');
  lockScreen.style.display = 'flex';
  setTimeout(() => { lockScreen.classList.remove('unlocked'); }, 10);
  showPage('dashboard', document.querySelector('.nav-item[data-target="dashboard"]')); 
}

document.addEventListener('keydown', function(e) {
  const lockScreen = document.getElementById('lock-screen');
  if (lockScreen && lockScreen.style.display !== 'none' && !lockScreen.classList.contains('unlocked')) {
    if (e.key >= '0' && e.key <= '9') { addPin(e.key); } 
    else if (e.key === 'Backspace') { removePin(); }
  }
});

initLockScreen();

// ==========================================
// FUNÇÕES DE NUVEM (FIREBASE) E SALVAMENTO
// ==========================================

async function loadData() {
  const syncStatus = document.getElementById('sync-status');
  
  if (typeof firebase !== 'undefined' && firebase.apps.length > 0) {
    syncStatus.style.display = 'block';
    syncStatus.innerText = '☁️ Sincronizando...';
    try {
      const docSnap = await db.collection("atelie").doc("dados").get();
      if (docSnap.exists) {
        estoque = docSnap.data().estoque || [];
        saidas = docSnap.data().saidas || [];
        clientes = docSnap.data().clientes || []; 
      }
      syncStatus.innerText = '✅ Sincronizado';
      setTimeout(() => { syncStatus.style.display = 'none'; }, 2000);
    } catch (error) {
      console.error("Erro no Firebase, puxando local", error);
      loadLocalFallback();
    }
  } else {
    loadLocalFallback();
  }

  // Correção: Apenas atualiza o conteúdo da tela ativa silenciosamente, sem forçar navegação
  renderDash(); 
  const abaAtual = localStorage.getItem('atelie_aba_atual') || 'dashboard';
  if (abaAtual === 'clientes') renderClientes();
  if (abaAtual === 'estoque') renderEstoque();
  if (abaAtual === 'saidas') renderSaidas();
  if (abaAtual === 'financeiro') renderFinanceiro();
}

function loadLocalFallback() {
  estoque = JSON.parse(localStorage.getItem('atelie_estoque') || '[]');
  saidas = JSON.parse(localStorage.getItem('atelie_saidas') || '[]');
  clientes = JSON.parse(localStorage.getItem('atelie_clientes') || '[]');
}

function save() {
  localStorage.setItem('atelie_estoque', JSON.stringify(estoque));
  localStorage.setItem('atelie_saidas', JSON.stringify(saidas));
  localStorage.setItem('atelie_clientes', JSON.stringify(clientes));

  if (typeof firebase !== 'undefined' && firebase.apps.length > 0) {
    const syncStatus = document.getElementById('sync-status');
    syncStatus.style.display = 'block';
    syncStatus.innerText = '☁️ Salvando...';
    
    db.collection("atelie").doc("dados").set({
      estoque: estoque,
      saidas: saidas,
      clientes: clientes
    }).then(() => {
      syncStatus.innerText = '✅ Salvo';
      setTimeout(() => { syncStatus.style.display = 'none'; }, 2000);
    }).catch(error => {
      console.error("Erro ao salvar no Firebase:", error);
      syncStatus.innerText = '❌ Erro ao salvar';
      setTimeout(() => { syncStatus.style.display = 'none'; }, 2000);
    });
  }
}

function toggleRelatorios() {
  const content = document.getElementById('relatorios-content');
  const icon = document.getElementById('toggle-relatorios-icon');
  
  if (content.style.display === 'none') {
    content.style.display = 'block';
    icon.style.transform = 'rotate(0deg)';
  } else {
    content.style.display = 'none';
    icon.style.transform = 'rotate(-90deg)';
  }
}

function formatCurrency(value) {
  return Number(value).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function readNumberInput(id) {
  let val = document.getElementById(id).value;
  if (!val) return 0;
  val = val.replace(/[^0-9,.]/g, ''); 
  val = val.replace(',', '.'); 
  return parseFloat(val) || 0;
}

function showPage(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  
  const page = document.getElementById('page-' + name);
  if (page) page.classList.add('active');
  
  if(el) {
    el.classList.add('active');
  } else {
    const navItem = document.querySelector(`.nav-item[data-target="${name}"]`);
    if(navItem) navItem.classList.add('active');
  }

  localStorage.setItem('atelie_aba_atual', name);

  if (name === 'clientes') renderClientes();
  if (name === 'estoque') renderEstoque();
  if (name === 'saidas') renderSaidas();
  if (name === 'financeiro') renderFinanceiro();
  if (name === 'dashboard') renderDash();
  window.scrollTo(0,0); 
}

function openModal(id) {
  if (id === 'modal-saida') {
      populateSaidaSelect();
      populateClienteSelect();
  }
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (id === 'modal-item') resetItemForm();
  if (id === 'modal-saida') resetSaidaForm();
  if (id === 'modal-cliente') resetClienteForm();
}

function salvarCliente() {
  const nome = document.getElementById('cli-nome').value.trim();
  const cpf = document.getElementById('cli-cpf').value.trim();
  const fone = document.getElementById('cli-fone').value.trim();
  const endereco = document.getElementById('cli-end').value.trim();
  const editId = document.getElementById('cli-edit-id').value;

  if (!nome || !fone) { alert('Nome e Telefone são obrigatórios!'); return; }

  if (editId) {
    const idx = clientes.findIndex(c => c.id == editId);
    if (idx > -1) clientes[idx] = { ...clientes[idx], nome, cpf, fone, endereco };
  } else {
    clientes.push({ id: Date.now(), nome, cpf, fone, endereco });
  }
  
  save(); renderClientes(); renderDash(); closeModal('modal-cliente');
}

function renderClientes() {
  const tbody = document.getElementById('clientes-body');
  if (!clientes.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-td" data-label=""><div class="empty"><div class="empty-icon">👥</div><p>Nenhum cliente cadastrado ainda.</p></div></td></tr>';
    return;
  }
  
  tbody.innerHTML = clientes.map(c => `
    <tr>
      <td data-label="Nome"><strong>${c.nome}</strong></td>
      <td data-label="CPF">${c.cpf || '-'}</td>
      <td data-label="Contato">${c.fone}</td>
      <td data-label="Endereço"><small>${c.endereco || '-'}</small></td>
      <td data-label="Ações">
        <button type="button" class="btn btn-sm btn-outline" onclick="editCliente(${c.id})">✏️ Editar</button>
        <button type="button" class="btn btn-sm btn-danger" onclick="deleteCliente(${c.id})">🗑️</button>
      </td>
    </tr>
  `).join('');
}

function editCliente(id) {
  const c = clientes.find(x => x.id == id);
  if (!c) return;
  document.getElementById('cli-nome').value = c.nome;
  document.getElementById('cli-cpf').value = c.cpf || '';
  document.getElementById('cli-fone').value = c.fone || '';
  document.getElementById('cli-end').value = c.endereco || '';
  document.getElementById('cli-edit-id').value = c.id;
  openModal('modal-cliente');
}

function deleteCliente(id) {
  const temVenda = saidas.some(s => s.clienteId == id);
  if (temVenda) {
    alert('Ação bloqueada: Este cliente possui histórico de pedidos. Exclua a saída primeiro.');
    return;
  }
  if (!confirm('Tem certeza que deseja deletar este cliente?')) return;
  clientes = clientes.filter(c => c.id != id);
  save(); renderClientes(); renderDash();
}

function resetClienteForm() {
  ['cli-nome','cli-cpf','cli-fone','cli-end','cli-edit-id'].forEach(id => document.getElementById(id).value = '');
}

function populateClienteSelect() {
  const sel = document.getElementById('saida-cliente');
  sel.innerHTML = '<option value="">Consumidor Final (Sem cadastro)</option>' +
    clientes.map(c => `<option value="${c.id}">${c.nome} - ${c.fone}</option>`).join('');
}

function salvarItem(manterAberto = false) {
  const nome = document.getElementById('item-nome').value.trim();
  const tamanho = document.getElementById('item-tamanho').value;
  const qtd = parseInt(document.getElementById('item-qtd').value) || 0;
  const preco = readNumberInput('item-preco');
  const cor = document.getElementById('item-cor').value.trim();
  const sku = document.getElementById('item-sku').value.trim();
  const editId = document.getElementById('item-edit-id').value;

  if (!nome || !tamanho) { alert('Preencha Nome e Tamanho!'); return; }

  if (editId) {
    const idx = estoque.findIndex(i => i.id == editId);
    if (idx > -1) estoque[idx] = { ...estoque[idx], nome, tamanho, qtd, preco, cor, sku };
  } else {
    estoque.push({ id: Date.now(), nome, tamanho, qtd, preco, cor, sku });
  }
  
  save(); renderEstoque(); renderDash();
  
  if (manterAberto) {
    resetItemForm();
    document.getElementById('item-nome').focus(); 
    document.querySelector('#modal-item .modal-body').scrollTo(0,0);
  } else {
    closeModal('modal-item');
  }
}

function renderEstoque() {
  const tbody = document.getElementById('estoque-body');
  if (!estoque.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-td" data-label=""><div class="empty"><div class="empty-icon">👙</div><p>Nenhum item cadastrado ainda.</p></div></td></tr>';
    return;
  }
  const sizeBadge = { PP:'badge-pp', P:'badge-p', M:'badge-m', G:'badge-g', GG:'badge-gg', Único:'badge-u' };
  
  tbody.innerHTML = estoque.map(i => `
    <tr>
      <td data-label="Item"><strong>${i.nome}</strong>${i.cor ? `<br><small style="color:var(--gray);font-weight:normal">${i.cor}</small>` : ''}${i.sku ? `<br><small style="color:var(--gray);font-weight:normal">${i.sku}</small>` : ''}</td>
      <td data-label="Tamanho"><span class="badge ${sizeBadge[i.tamanho]||'badge-u'}">${i.tamanho}</span></td>
      <td data-label="Quantidade"><span style="font-weight:700;color:${i.qtd<=3?'#e63946':'var(--green)'}">${i.qtd}</span>${i.qtd<=3?'<span style="font-size:11px;color:#e63946;margin-left:5px;">⚠️ Baixo</span>':''}</td>
      <td data-label="Preço">${i.preco ? formatCurrency(i.preco) : formatCurrency(0)}</td>
      <td data-label="Ações">
        <button type="button" class="btn btn-sm btn-outline" onclick="editItem(${i.id})">✏️ Editar</button>
        <button type="button" class="btn btn-sm btn-danger" onclick="deleteItem(${i.id})">🗑️</button>
      </td>
    </tr>
  `).join('');
}

function editItem(id) {
  const i = estoque.find(x => x.id == id);
  if (!i) return;
  document.getElementById('item-nome').value = i.nome;
  document.getElementById('item-tamanho').value = i.tamanho;
  document.getElementById('item-qtd').value = i.qtd;
  document.getElementById('item-preco').value = i.preco ? i.preco.toFixed(2).replace('.', ',') : '';
  document.getElementById('item-cor').value = i.cor || '';
  document.getElementById('item-sku').value = i.sku || '';
  document.getElementById('item-edit-id').value = i.id;
  openModal('modal-item');
}

function deleteItem(id) {
  const temSaida = saidas.some(s => s.itemId == id);
  if (temSaida) {
    alert('Ação bloqueada: Este item possui histórico de vendas. Exclua a saída primeiro.');
    return;
  }
  if (!confirm('Tem certeza que deseja deletar este item?')) return;
  estoque = estoque.filter(i => i.id != id);
  save(); renderEstoque(); renderDash();
}

function resetItemForm() {
  ['item-nome','item-tamanho','item-qtd','item-preco','item-cor','item-sku','item-edit-id'].forEach(id => document.getElementById(id).value = '');
}

function populateSaidaSelect() {
  const sel = document.getElementById('saida-item');
  sel.innerHTML = '<option value="">Selecione o item</option>' +
    estoque.map(i => `<option value="${i.id}" data-preco="${i.preco}">${i.nome} - ${i.tamanho} (Estq: ${i.qtd})</option>`).join('');
}

function autoPreco() {
  const sel = document.getElementById('saida-item');
  const opt = sel.options[sel.selectedIndex];
  if (opt && opt.dataset.preco) {
    const preco = parseFloat(opt.dataset.preco);
    document.getElementById('saida-valor').value = preco ? preco.toFixed(2).replace('.', ',') : '';
  }
}

function salvarSaida() {
  const data = document.getElementById('saida-data').value;
  const clienteId = document.getElementById('saida-cliente').value;
  const itemId = document.getElementById('saida-item').value;
  const qtd = parseInt(document.getElementById('saida-qtd').value) || 1;
  const dev = parseInt(document.getElementById('saida-dev').value) || 0;
  const valor = readNumberInput('saida-valor');
  const pedido = document.getElementById('saida-pedido').value.trim();
  const editId = document.getElementById('saida-edit-id').value;

  if (!data || !itemId) { alert('Atenção: Preencha Data e Item!'); return; }
  if (dev > qtd) { alert('Atenção: A devolução não pode ser maior que a quantidade entregue.'); return; }

  const item = estoque.find(i => i.id == itemId);
  if (!item) return;

  const deducaoPretendida = qtd - dev;
  let estoqueDisponivel = item.qtd;

  if (editId) {
    const oldSaida = saidas.find(s => s.id == editId);
    if (oldSaida && oldSaida.itemId == itemId) {
      estoqueDisponivel += (oldSaida.qtd - oldSaida.dev);
    }
  }

  if (deducaoPretendida > estoqueDisponivel) {
    alert(`Atenção: Estoque insuficiente! Você tem apenas ${estoqueDisponivel} unidade(s) disponíveis.`);
    return;
  }

  if (editId) {
    const idx = saidas.findIndex(s => s.id == editId);
    if (idx > -1) {
      const oldSaida = saidas[idx];
      const oldItem = estoque.find(i => i.id == oldSaida.itemId);
      if (oldItem) oldItem.qtd += (oldSaida.qtd - oldSaida.dev);
      if (item) item.qtd = Math.max(0, item.qtd - deducaoPretendida);
      saidas[idx] = { ...saidas[idx], data, clienteId, itemId, itemNome: item?.nome, itemTamanho: item?.tamanho, itemCor: item?.cor, qtd, dev, valor, pedido };
    }
  } else {
    saidas.push({ id: Date.now(), data, clienteId, itemId, itemNome: item?.nome, itemTamanho: item?.tamanho, itemCor: item?.cor, qtd, dev, valor, pedido });
    if (item) { item.qtd = Math.max(0, item.qtd - deducaoPretendida); }
  }
  
  save(); renderSaidas(); renderDash(); closeModal('modal-saida');
}

function editSaida(id) {
  const s = saidas.find(x => x.id == id);
  if (!s) return;
  populateSaidaSelect();
  populateClienteSelect();
  document.getElementById('saida-data').value = s.data;
  document.getElementById('saida-cliente').value = s.clienteId || '';
  document.getElementById('saida-item').value = s.itemId;
  document.getElementById('saida-qtd').value = s.qtd;
  document.getElementById('saida-dev').value = s.dev;
  document.getElementById('saida-valor').value = s.valor ? s.valor.toFixed(2).replace('.', ',') : '';
  document.getElementById('saida-pedido').value = s.pedido || '';
  document.getElementById('saida-edit-id').value = s.id;
  openModal('modal-saida');
}

function gerarRecibo(idSaida) {
  const s = saidas.find(x => x.id == idSaida);
  if(!s) return;
  
  const c = clientes.find(x => x.id == s.clienteId);
  const dataPtBr = formatDate(s.data);

  document.getElementById('rec-cliente-nome').innerText = c ? c.nome : 'Consumidor Final';
  document.getElementById('rec-cliente-cpf').innerText = c ? (c.cpf || 'Não informado') : '-';
  document.getElementById('rec-cliente-end').innerText = c ? (c.endereco || 'Não informado') : '-';
  document.getElementById('rec-data').innerText = dataPtBr;
  
  document.getElementById('rec-pedido').innerText = s.pedido || s.id;
  
  let corDoItem = s.itemCor;
  if (!corDoItem) {
    const itemAtual = estoque.find(i => i.id == s.itemId);
    if (itemAtual && itemAtual.cor) {
      corDoItem = itemAtual.cor;
    }
  }
  
  const textoCor = corDoItem ? ` - ${corDoItem}` : '';
  document.getElementById('rec-item').innerText = `${s.itemNome} - Tam: ${s.itemTamanho}${textoCor}`;
  
  document.getElementById('rec-qtd').innerText = s.qtd;
  
  const total = s.valor * s.qtd;
  document.getElementById('rec-valor').innerText = formatCurrency(total);
  document.getElementById('rec-total-geral').innerText = formatCurrency(total);
  
  document.getElementById('rec-assinatura-nome').innerText = c ? c.nome : 'Assinatura do Cliente';

  openModal('modal-recibo');
}

function getFiltredSaidas() {
  let list = [...saidas];
  const ini = document.getElementById('filter-inicio')?.value;
  const fim = document.getElementById('filter-fim')?.value;
  if (ini) list = list.filter(s => s.data >= ini);
  if (fim) list = list.filter(s => s.data <= fim);
  return list.sort((a,b) => b.data.localeCompare(a.data));
}

function renderSaidas() {
  const tbody = document.getElementById('saidas-body');
  const list = getFiltredSaidas();
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-td" data-label=""><div class="empty"><div class="empty-icon">📦</div><p>Nenhuma saída registrada ainda.</p></div></td></tr>';
    document.getElementById('saidas-resumo').innerHTML = '';
    return;
  }

  const totalPedidos = list.reduce((s,x) => s + x.qtd, 0);
  const totalDev = list.reduce((s,x) => s + x.dev, 0);

  document.getElementById('saidas-resumo').innerHTML = `
    <div style="background:var(--green-pale);border-radius:8px;padding:8px 12px;font-size:12px;">
      <strong style="color:var(--green)">📦 ${list.length} registros</strong>
    </div>
    <div style="background:var(--green-pale);border-radius:8px;padding:8px 12px;font-size:12px;">
      <strong style="color:var(--green)">✅ ${totalPedidos} entregues</strong>
    </div>
    <div style="background:#fee2e2;border-radius:8px;padding:8px 12px;font-size:12px;">
      <strong style="color:#991b1b">↩️ ${totalDev} devs.</strong>
    </div>
  `;

  tbody.innerHTML = list.map(s => {
    const c = clientes.find(x => x.id == s.clienteId);
    const nomeCli = c ? c.nome : 'Consumidor';
    return `
    <tr>
      <td data-label="Data">${formatDate(s.data)}</td>
      <td data-label="Item">${s.itemNome || '-'}</td>
      <td data-label="Cliente/Ped">${nomeCli}<br><small style="color:var(--gray)">${s.pedido||'Avulso'}</small></td>
      <td data-label="Entregue" style="font-weight:700;color:var(--green)">${s.qtd} ${s.dev > 0 ? `<span class="badge badge-dev">↩️ -${s.dev}</span>` : ''}</td>
      <td data-label="Valor">${formatCurrency(s.valor)}</td>
      <td data-label="Ações">
        <button type="button" class="btn btn-sm" style="background:#3b82f6;color:white;" onclick="gerarRecibo(${s.id})" title="Gerar Recibo">🧾 PDF</button>
        <button type="button" class="btn btn-sm btn-outline" onclick="editSaida(${s.id})">✏️ Editar</button>
        <button type="button" class="btn btn-sm btn-danger" onclick="deleteSaida(${s.id})">🗑️</button>
      </td>
    </tr>
  `}).join('');
}

function deleteSaida(id) {
  if (!confirm('Deletar registro? O estoque será devolvido.')) return;
  const s = saidas.find(x => x.id == id);
  if (s) {
      const item = estoque.find(i => i.id == s.itemId);
      if (item) item.qtd += (s.qtd - s.dev);
  }
  saidas = saidas.filter(x => x.id != id);
  save(); renderSaidas(); renderDash();
}

function resetSaidaForm() {
  ['saida-data','saida-cliente','saida-item','saida-qtd','saida-dev','saida-valor','saida-pedido','saida-edit-id'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('saida-qtd').value = 1;
  document.getElementById('saida-dev').value = 0;
}

function limparSelectsEFiltrar() {
  document.getElementById('filter-mes').value = '';
  document.getElementById('filter-ano').value = '';
  renderSaidas();
}

function aplicarFiltroMes() {
  const mes = document.getElementById('filter-mes').value;
  let ano = document.getElementById('filter-ano').value;
  if (mes && !ano) {
    ano = new Date().getFullYear().toString();
    document.getElementById('filter-ano').value = ano;
  }
  if (ano) {
    if (mes) {
      document.getElementById('filter-inicio').value = `${ano}-${mes}-01`;
      const lastDay = new Date(ano, mes, 0).getDate();
      document.getElementById('filter-fim').value = `${ano}-${mes}-${lastDay}`;
    } else {
      document.getElementById('filter-inicio').value = `${ano}-01-01`;
      document.getElementById('filter-fim').value = `${ano}-12-31`;
    }
  } else {
    if (!mes) {
       document.getElementById('filter-inicio').value = '';
       document.getElementById('filter-fim').value = '';
    }
  }
  renderSaidas();
}

function limparFiltros() {
  document.getElementById('filter-inicio').value = '';
  document.getElementById('filter-fim').value = '';
  document.getElementById('filter-mes').value = '';
  document.getElementById('filter-ano').value = '';
  renderSaidas();
}

function renderFinanceiro() {
  const mes = document.getElementById('fin-mes').value;
  const ano = document.getElementById('fin-ano').value;
  let list = [...saidas];
  
  if (mes && ano) { list = list.filter(s => s.data.startsWith(`${ano}-${mes}`)); }
  else if (ano) { list = list.filter(s => s.data.startsWith(ano)); }
  else if (mes) { list = list.filter(s => s.data.substring(5, 7) === mes); }

  const bruta = list.reduce((s,x) => s + (x.valor * x.qtd), 0);
  const devVal = list.reduce((s,x) => s + (x.valor * x.dev), 0);
  const liquida = bruta - devVal;

  document.getElementById('fin-bruta').textContent = formatCurrency(bruta);
  document.getElementById('fin-dev').textContent = formatCurrency(devVal);
  document.getElementById('fin-liquida').textContent = formatCurrency(liquida);

  const map = {};
  list.forEach(s => {
    const key = `${s.itemId}`;
    if (!map[key]) map[key] = { nome: s.itemNome, tam: s.itemTamanho, qtd: 0, dev: 0, val: 0 };
    map[key].qtd += s.qtd;
    map[key].dev += s.dev;
    map[key].val += s.valor * (s.qtd - s.dev); 
  });

  const tbody = document.getElementById('fin-body');
  const rows = Object.values(map);
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-td" data-label=""><div class="empty"><p>Nenhum dado para o período.</p></div></td></tr>';
  } else {
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td data-label="Item">${r.nome}</td>
        <td data-label="Tamanho">${r.tam}</td>
        <td data-label="Qtd Vendida" style="font-weight:700;color:var(--green)">${r.qtd}</td>
        <td data-label="Devoluções" style="color:#e63946">${r.dev}</td>
        <td data-label="Receita Líq." style="font-weight:700">${formatCurrency(r.val)}</td>
      </tr>
    `).join('');
  }
}

function renderDash() {
  document.getElementById('dash-total-itens').textContent = estoque.length;
  document.getElementById('dash-total-clientes').textContent = clientes.length;

  const totalPed = saidas.reduce((s,x) => s + x.qtd, 0);
  const totalDev = saidas.reduce((s,x) => s + x.dev, 0);
  
  const bruta = saidas.reduce((s,x) => s + (x.valor * x.qtd), 0);
  const devVal = saidas.reduce((s,x) => s + (x.valor * x.dev), 0);
  const liquida = bruta - devVal;

  document.getElementById('dash-total-pedidos').textContent = totalPed;
  document.getElementById('dash-total-dev').textContent = totalDev;
  document.getElementById('dash-receita').textContent = formatCurrency(liquida);

  const low = estoque.filter(i => i.qtd <= 3);
  const cont = document.getElementById('dash-low-stock');
  if (!low.length) {
    cont.innerHTML = '<div class="empty"><div class="empty-icon">✅</div><p>Tudo certo no estoque.</p></div>';
  } else {
    const sizeBadge = { PP:'badge-pp', P:'badge-p', M:'badge-m', G:'badge-g', GG:'badge-gg', Único:'badge-u' };
    cont.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:12px;">${low.map(i=>`
      <div style="background:#fff5f5;border:1px solid #fecaca;border-radius:12px;padding:16px;">
        <div style="font-weight:700;color:#1a2e23;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${i.nome}">${i.nome}</div>
        <div style="margin-top:6px"><span class="badge ${sizeBadge[i.tamanho]||'badge-u'}">${i.tamanho}</span></div>
        <div style="margin-top:10px;font-size:13px;color:#e63946;font-weight:700">⚠️ ${i.qtd} rest.</div>
      </div>
    `).join('')}</div>`;
  }
}

function formatDate(d) {
  if (!d) return '-';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}
